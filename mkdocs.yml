site_name: PhiSQL Specification
site_description: >-
  The canonical reference for PhiSQL, the declarative query language for PII
  privacy operations across the Philterd toolkit.
site_url: https://philterd.github.io/phisql/
copyright: >-
  &copy; Philterd, LLC. "PhiSQL" is a registered trademark of Philterd, LLC.
  The specification is licensed under the Apache License, Version 2.0.

repo_name: philterd/phisql
repo_url: https://github.com/philterd/phisql
edit_uri: ""

docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  version:
    provider: mike
    default: latest

plugins:
  - search
  - gen-files:
      scripts:
        - scripts/gen_docs.py
  - literate-nav:
      nav_file: SUMMARY.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
