# PhiSQL v0.1 reserved keyword catalog.
#
# These keywords are reserved by the language. Implementations must reject
# them as user-defined identifier names (policy names, dictionary names,
# named argument names, custom-identifier classifications). Matching is
# case-insensitive: "POLICY", "policy", and "Policy" all collide.
#
# Status: DRAFT. Subject to change before v1.0.
#
# Entity type identifiers from entity-types.yaml and strategy names from
# strategies.yaml are also reserved when appearing in their respective
# syntactic positions; they are not duplicated here.

version: v0.1

keywords:
  - ABBREVIATE
  - AND
  - AS
  - AVG
  - BY
  - CASE
  - CONFIDENCE
  - COUNT
  - DEFINE
  - DEIDENTIFY
  - DESCRIPTION
  - DETECT
  - DISCOVER
  - ENCRYPT
  - ENDPOINT
  - ENTITIES
  - FALSE
  - FIND
  - FOR
  - FPE_ENCRYPT
  - FROM
  - GROUP
  - HASH_SHA256
  - IDENTIFIER
  - IGNORE
  - IN
  - INSENSITIVE
  - LABELS
  - LAST_4
  - LIMIT
  - MASK
  - MATCHING
  - MAX
  - MIN
  - OR
  - PATTERN
  - PHEYE
  - PII
  - POLICY
  - RANDOM_REPLACE
  - REDACT
  - SCAN
  - SELECT
  - SENSITIVE
  - SHIFT
  - STATIC_REPLACE
  - SUM
  - TERMS
  - TRUE
  - TRUNCATE
  - TRUNCATE_TO_YEAR
  - WHERE
  - WITH
