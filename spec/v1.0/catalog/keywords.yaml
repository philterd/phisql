# PhiSQL v1.0 reserved keyword catalog.
#
# These keywords are reserved by the language. Implementations must reject
# them as user-defined identifier names (policy names, dictionary names,
# named argument names, custom-identifier classifications). Matching is
# case-insensitive: "POLICY", "policy", and "Policy" all collide.
#
# Status: Stable (v1.0).
#
# Entity type identifiers from entity-types.yaml and strategy names from
# strategies.yaml are also reserved when appearing in their respective
# syntactic positions; they are not duplicated here.

version: v1.0

keywords:
  - ABBREVIATE
  - ANALYSIS
  - AND
  - AS
  - AVG
  - BOX
  - BY
  - CAPITALIZED
  - CASE
  - CONFIDENCE
  - CONFIGURE
  - COUNT
  - CRYPTO
  - DEFINE
  - DEIDENTIFY
  - DESCRIPTION
  - DETECT
  - DICTIONARY
  - DISCOVER
  - ENCRYPT
  - END
  - ENDPOINT
  - ENTITIES
  - ENV
  - FALSE
  - FIND
  - FOR
  - FPE
  - FPE_ENCRYPT
  - FROM
  - FUZZY
  - GRAPHICAL
  - GROUP
  - HASH_SHA256
  - IDENTIFIER
  - IGNORE
  - IN
  - INSENSITIVE
  - KEY
  - LABELS
  - LAST_4
  - LIMIT
  - MASK
  - MATCHING
  - MAX
  - MIN
  - MODEL
  - OPTIONS
  - OR
  - PATTERN
  - PDF
  - PHEYE
  - PII
  - POLICY
  - POSTFILTERS
  - RANDOM_REPLACE
  - REDACT
  - RELATIVE
  - SCAN
  - SECTION
  - SELECT
  - SENSITIVE
  - SENSITIVITY
  - SHIFT
  - SPLITTING
  - START
  - STATIC_REPLACE
  - SUM
  - TERMS
  - TRUE
  - TRUNCATE
  - TRUNCATE_TO_YEAR
  - TWEAK
  - WHERE
  - WITH
