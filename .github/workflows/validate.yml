name: Validate spec artifacts

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Validate catalog YAML, schema references, and example JSON
        run: python scripts/validate_spec.py

      - name: Unit-test the spec validator helpers
        run: pytest scripts/tests -q
