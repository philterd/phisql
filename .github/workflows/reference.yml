name: Build reference implementation

on:
  push:
    branches: [main]
  pull_request:

jobs:
  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and test the Java reference implementation
        working-directory: reference/java
        run: mvn -B verify

      # The parser is generated from spec/v1.0/grammar/PhiSQL.g4 at build time
      # and every example .phisql file is parsed by the generated parser as
      # part of the test suite. If the grammar drifts from the examples, this
      # job fails.

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install the Python reference implementation
        working-directory: reference/python
        run: pip install -e ".[test]"

      - name: Test the Python reference implementation
        working-directory: reference/python
        run: pytest

      # The parser is generated from spec/v1.0/grammar/PhiSQL.g4 by ANTLR (the
      # generated sources are committed under phisql/_generated/). Every example
      # .phisql file is parsed and compiled as part of the test suite, so if the
      # grammar or catalog drifts from the examples, this job fails. The
      # python-parser-drift job below additionally checks that the committed
      # generated parser still matches the grammar. Installing and testing here
      # is pure-Python; no Java is needed.

  python-parser-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Regenerate the committed parser from the grammar and fail if it differs.
      # This is the "the parser cannot drift from the grammar" guarantee: the
      # Java reference gets it by generating at build time; here, because the
      # generated sources are committed so the package stays pure-Python, it is
      # enforced by regenerating in CI and diffing.
      - name: Regenerate the parser from the grammar
        working-directory: reference/python
        run: ./scripts/generate_parser.sh

      - name: Fail if the committed parser is out of date
        run: |
          if ! git diff --exit-code -- reference/python/phisql/_generated; then
            echo "::error::phisql/_generated is out of date with spec/v1.0/grammar/PhiSQL.g4. Run reference/python/scripts/generate_parser.sh and commit the result." >&2
            exit 1
          fi

  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Test the .NET reference implementation
        working-directory: reference/dotnet
        run: dotnet test PhiSql.Tests -c Release

      # The hand-written parser mirrors spec/v1.0/grammar/PhiSQL.g4 and the
      # catalog + schema are embedded from spec/ and schema/ at build time.
      # Every example .phisql file is parsed and compiled, and every compiled
      # example is validated against the schema, as part of the test suite. If
      # the grammar, catalog, or schema drifts from the examples, this job fails.
