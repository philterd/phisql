name: Build reference implementation

on:
  push:
    branches: [main]
  pull_request:

jobs:
  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and test the Java reference implementation
        working-directory: reference/java
        run: mvn -B verify

      # The parser is generated from spec/v1.0/grammar/PhiSQL.g4 at build time
      # and every example .phisql file is parsed by the generated parser as
      # part of the test suite. If the grammar drifts from the examples, this
      # job fails.

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install the Python reference implementation
        working-directory: reference/python
        run: pip install -e ".[test]"

      - name: Test the Python reference implementation
        working-directory: reference/python
        run: pytest

      # The parser is generated from spec/v1.0/grammar/PhiSQL.g4 by ANTLR (the
      # generated sources are committed under phisql/_generated/). Every example
      # .phisql file is parsed and compiled as part of the test suite, so if the
      # grammar or catalog drifts from the examples, this job fails. The
      # parser-drift job below additionally checks that the committed generated
      # parser still matches the grammar. Installing and testing here is
      # pure-Python; no Java is needed.

  parser-drift:
    # The Python and .NET references commit their ANTLR-generated parsers (so
    # those packages stay pure-Python / pure-.NET to install and test). This job
    # regenerates both from the grammar and fails if either differs, giving the
    # same "the parser cannot drift from the grammar" guarantee the Java
    # reference gets by generating at build time. Only Java is needed here; the
    # generate scripts run the ANTLR tool and do not build the packages.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Regenerate the Python parser from the grammar
        working-directory: reference/python
        run: ./scripts/generate_parser.sh

      - name: Regenerate the .NET parser from the grammar
        working-directory: reference/dotnet
        run: ./scripts/generate_parser.sh

      - name: Fail if either committed parser is out of date
        run: |
          if ! git diff --exit-code -- \
              reference/python/phisql/_generated \
              reference/dotnet/PhiSql/Generated; then
            echo "::error::A committed generated parser is out of date with spec/v1.0/grammar/PhiSQL.g4. Run the reference's scripts/generate_parser.sh and commit the result." >&2
            exit 1
          fi

  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Test the .NET reference implementation
        working-directory: reference/dotnet
        run: dotnet test PhiSql.Tests -c Release

      # The parser is generated from spec/v1.0/grammar/PhiSQL.g4 by ANTLR (the
      # generated sources are committed under PhiSql/Generated/) and the catalog
      # + schema are embedded from spec/ and schema/ at build time. Every example
      # .phisql file is parsed and compiled, and every compiled example is
      # validated against the schema, as part of the test suite. If the grammar,
      # catalog, or schema drifts from the examples, this job fails. The
      # parser-drift job above checks the committed parser against the grammar.

  publish-snapshot:
    # Publish the Java reference implementation's -SNAPSHOT to the Maven Central
    # snapshot repository on every push to main, but only after the Java build
    # passes. Never runs on pull requests (which keeps the credentials away from
    # fork builds).
    needs: java
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: publish-snapshot-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD

      - name: Publish snapshot to Maven Central
        working-directory: reference/java
        run: mvn --batch-mode --no-transfer-progress -DskipTests deploy
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
